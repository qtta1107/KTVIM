<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ Đường ngân sách</title>
    
    <!-- Import Tailwind CSS để dùng các class giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import thư viện React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Import Babel để trình duyệt hiểu được mã JSX của React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#060a16] m-0 p-0">
    <!-- Nơi React sẽ hiển thị ứng dụng -->
    <div id="root"></div>

    <!-- Đoạn mã React của chúng ta -->
    <script type="text/babel">
        // Lấy các hàm cần thiết từ React
        const { useState, useRef, useEffect } = React;

        function App() {
            // Thêm State cho màn hình Intro và Fullscreen
            const [showIntro, setShowIntro] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);

            // Trạng thái cho các biến số
            const [income, setIncome] = useState(16);
            const [priceX, setPriceX] = useState(2.0); // Khởi tạo với số thập phân
            const [priceY, setPriceY] = useState(1.0);
            
            // Trạng thái lưu các điểm (points) do người dùng click
            const [points, setPoints] = useState([]);
            // Trạng thái lưu toạ độ chuột trực tiếp
            const [hoverPoint, setHoverPoint] = useState(null);

            const svgRef = useRef(null);

            // Trục toạ độ logic cố định (Giảm từ 40 xuống 32)
            const maxVal = 32;

            // Kích thước SVG thu gọn để fit 1 màn hình
            const width = 640;
            const height = 360;
            
            // Không gian padding trong biểu đồ
            const padL = 60;
            const padB = 40;
            const padR = 40;
            const padT = 40; // Tăng khoảng trống phía trên từ 20 lên 40 để mũi tên không bị xén

            // Kích thước khu vực vẽ biểu đồ thực tế
            const chartW = width - padL - padR;
            const chartH = height - padB - padT;
            
            // Tỷ lệ quy đổi từ logic sang pixel
            const scaleX = chartW / maxVal;
            const scaleY = chartH / maxVal;

            // Tính điểm cắt các trục dựa trên logic
            const xIntercept = income / priceX;
            const yIntercept = income / priceY;
            
            // Tính Tỷ lệ Px/Py (để hiển thị góc dưới)
            const ratioVal = (priceX / priceY).toFixed(2);

            // Thoát Fullscreen khi nhấn phím ESC
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setIsFullscreen(false);
                    }
                };
                document.addEventListener('keydown', handleKeyDown);
                return () => document.removeEventListener('keydown', handleKeyDown);
            }, []);

            // Hàm bật/tắt Fullscreen bằng CSS (Giả lập Fullscreen để tránh lỗi Permissions Policy)
            const toggleFullscreen = () => {
                setIsFullscreen(!isFullscreen);
            };

            // Hàm trích xuất toạ độ logic từ vị trí chuột
            const getLogicalCoordinates = (clientX, clientY) => {
                const svg = svgRef.current;
                if (!svg) return null;
                const pt = svg.createSVGPoint();
                pt.x = clientX;
                pt.y = clientY;
                const cursorPt = pt.matrixTransform(svg.getScreenCTM().inverse());
                
                const graphX = cursorPt.x - padL;
                const graphY = (height - padB) - cursorPt.y; 

                if (graphX >= -10 && graphX <= chartW + 20 && graphY >= -10 && graphY <= chartH + 20) {
                    return {
                        x: Math.max(0, graphX) / scaleX,
                        y: Math.max(0, graphY) / scaleY
                    };
                }
                return null;
            };

            // Theo dõi chuột khi di chuyển trong SVG
            const handleMouseMove = (e) => {
                setHoverPoint(getLogicalCoordinates(e.clientX, e.clientY));
            };

            // Ẩn toạ độ khi đưa chuột ra ngoài SVG
            const handleMouseLeave = () => {
                setHoverPoint(null);
            };

            // Xử lý sự kiện click vào đồ thị để ghim điểm
            const handleChartClick = (e) => {
                const coords = getLogicalCoordinates(e.clientX, e.clientY);
                if (coords) {
                    setPoints([...points, { id: Date.now(), x: coords.x, y: coords.y }]);
                }
            };

            const handleRemovePoint = (e, id) => {
                e.stopPropagation(); 
                setPoints(points.filter(p => p.id !== id));
            };

            // --- GIAO DIỆN MỞ ĐẦU (INTRO OPENING THEO THIẾT KẾ FIGMA) ---
            if (showIntro) {
                return (
                    <div 
                        onClick={() => setShowIntro(false)}
                        className="h-screen w-screen bg-[#020C20] flex items-center justify-center text-white overflow-hidden relative cursor-pointer"
                        style={{ fontFamily: "'Roboto Slab', serif" }}
                    >
                        {/* Đảm bảo Font Roboto Slab được load ngay từ màn hình Intro */}
                        <style dangerouslySetInnerHTML={{__html: `
                            @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500&display=swap');
                        `}} />

                        {/* Tiêu đề chính */}
                        <div className="text-center text-[48px] leading-[64px] text-white uppercase px-4">
                            BIỂU ĐỒ TƯƠNG TÁC MINH HOẠ<br/>ĐƯỜNG NGÂN SÁCH
                        </div>

                        {/* Chữ ký */}
                        <div className="absolute bottom-8 right-8 lg:bottom-[39px] lg:right-[189px] text-[15px] leading-[132.42%] text-white opacity-[0.51]">
                            by Tuấn Anh - 2511110048
                        </div>

                        {/* Hướng dẫn click nhỏ (nhấp nháy mờ) */}
                        <div className="absolute bottom-8 text-[13px] opacity-20 animate-pulse tracking-wider">
                            * Nhấp chuột để bắt đầu
                        </div>
                    </div>
                );
            }

            // --- GIAO DIỆN CHÍNH ---
            return (
                <div className={`${isFullscreen ? 'fixed inset-0 z-[100] w-full h-full' : 'h-screen w-full relative'} bg-[#060a16] flex flex-col items-center justify-evenly py-4 px-4 font-serif text-white selection:bg-[#93A3C7] overflow-hidden`}>

                    {/* Nút Fullscreen */}
                    <button 
                        onClick={toggleFullscreen} 
                        className="absolute top-4 right-4 p-2.5 bg-white/10 hover:bg-white/20 rounded-full transition-colors z-50 flex items-center justify-center border border-white/20 text-[#93A3C7]"
                        title={isFullscreen ? "Thoát toàn màn hình" : "Toàn màn hình"}
                    >
                        {isFullscreen ? (
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
                        ) : (
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                        )}
                    </button>

                    {/* CSS Tuỳ chỉnh cho thanh trượt */}
                    <style dangerouslySetInnerHTML={{__html: `
                        .custom-slider {
                            -webkit-appearance: none;
                            background: transparent;
                            width: 100%;
                        }
                        .custom-slider:focus { outline: none; }
                        .custom-slider::-webkit-slider-runnable-track {
                            width: 100%; height: 1px; cursor: pointer; background: #475569;
                        }
                        .custom-slider::-webkit-slider-thumb {
                            height: 16px; width: 16px; border-radius: 50%; background: #060a16;
                            border: 4px solid #ffffff; cursor: pointer; -webkit-appearance: none; margin-top: -7.5px;
                        }
                    `}} />

                    {/* Khu vực 1: Phương trình Đường Ngân Sách ĐỘNG */}
                    <div className="border border-white/60 rounded-[1.25rem] px-8 py-3 text-xl flex items-center justify-center gap-4 shadow-lg bg-[#060a16] flex-shrink-0 z-10">
                        <span>Y = -</span>
                        <div className="flex flex-col items-center text-lg font-mono text-[#93A3C7] font-bold">
                            {/* Dùng toFixed(1) để giữ chuẩn 1 số thập phân ở phương trình */}
                            <span className="border-b border-[#93A3C7] px-2 leading-tight pb-0.5">{priceX.toFixed(1)}</span>
                            <span className="leading-tight pt-0.5">{priceY.toFixed(1)}</span>
                        </div>
                        <span>. X +</span>
                        <div className="flex flex-col items-center text-lg font-mono text-[#93A3C7] font-bold">
                            <span className="border-b border-[#93A3C7] px-2 leading-tight pb-0.5">{income}</span>
                            <span className="leading-tight pt-0.5">{priceY.toFixed(1)}</span>
                        </div>
                    </div>

                    {/* Khu vực 2: Thanh trượt & Biểu đồ */}
                    <div className="flex flex-col md:flex-row justify-center items-center w-full max-w-5xl gap-8 lg:gap-16 flex-shrink-0">
                        
                        {/* Cột trái: Bảng điều khiển thanh trượt dọc */}
                        <div className="flex flex-col gap-6 w-full max-w-[240px]">
                            {/* I */}
                            <div className="flex flex-col gap-3 w-full">
                                <div className="flex justify-end items-center gap-3 w-full pr-2">
                                    <span className="text-xl font-medium text-right">I =</span>
                                    <span className="border-[1.5px] border-white rounded-xl px-3 py-1 bg-[#060a16] min-w-[4rem] text-center font-mono text-lg tracking-widest">
                                        {income.toString().padStart(2, '0')}
                                    </span>
                                </div>
                                <input type="range" className="custom-slider" min="16" max="32" step="1" value={income} onChange={(e)=>setIncome(Number(e.target.value))} />
                            </div>

                            {/* Px */}
                            <div className="flex flex-col gap-3 w-full">
                                <div className="flex justify-end items-center gap-3 w-full pr-2">
                                    <span className="text-xl font-medium text-right">Px =</span>
                                    <span className="border-[1.5px] border-white rounded-xl px-3 py-1 bg-[#060a16] min-w-[4rem] text-center font-mono text-lg tracking-widest">
                                        {(priceX < 10 ? '0' : '') + priceX.toFixed(1)}
                                    </span>
                                </div>
                                {/* Đổi min thành 1, giữ step 0.1 để nhận số thập phân */}
                                <input type="range" className="custom-slider" min="1" max="20" step="0.1" value={priceX} onChange={(e)=>setPriceX(Number(e.target.value))} />
                            </div>

                            {/* Py */}
                            <div className="flex flex-col gap-3 w-full">
                                <div className="flex justify-end items-center gap-3 w-full pr-2">
                                    <span className="text-xl font-medium text-right">Py =</span>
                                    <span className="border-[1.5px] border-white rounded-xl px-3 py-1 bg-[#060a16] min-w-[4rem] text-center font-mono text-lg tracking-widest">
                                        {(priceY < 10 ? '0' : '') + priceY.toFixed(1)}
                                    </span>
                                </div>
                                {/* Đổi min thành 1, giữ step 0.1 để nhận số thập phân */}
                                <input type="range" className="custom-slider" min="1" max="20" step="0.1" value={priceY} onChange={(e)=>setPriceY(Number(e.target.value))} />
                            </div>
                        </div>

                        {/* Cột phải: Vùng chứa Biểu đồ */}
                        <div className="w-full max-w-[640px] bg-[#93A3C7] rounded-[2rem] py-6 px-6 shadow-2xl relative select-none flex justify-center items-center overflow-hidden">
                            <svg 
                                ref={svgRef}
                                viewBox={`0 0 ${width} ${height}`} 
                                className="w-full h-auto drop-shadow-md overflow-hidden cursor-crosshair"
                                onMouseMove={handleMouseMove}
                                onMouseLeave={handleMouseLeave}
                                onClick={handleChartClick}
                            >
                                <defs>
                                    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
                                    </marker>
                                </defs>

                                {/* Nhóm trục và đồ thị dịch về gốc toạ độ mới */}
                                <g transform={`translate(${padL}, ${height - padB})`}>
                                    
                                    <rect x={0} y={-chartH - 20} width={chartW + 20} height={chartH + 20} fill="transparent" />

                                    {/* --- THÊM LƯỚI TỌA ĐỘ 1x1 MỜ MỜ VÀO NỀN --- */}
                                    {Array.from({length: maxVal}, (_, i) => i + 1).map(val => (
                                        <g key={`grid-${val}`}>
                                            {/* Lưới dọc */}
                                            <line x1={val * scaleX} y1={0} x2={val * scaleX} y2={-chartH - 20} stroke="#000" strokeWidth="0.8" strokeDasharray="3 3" opacity="0.15" />
                                            {/* Lưới ngang */}
                                            <line x1={0} y1={-val * scaleY} x2={chartW + 20} y2={-val * scaleY} stroke="#000" strokeWidth="0.8" strokeDasharray="3 3" opacity="0.15" />
                                        </g>
                                    ))}

                                    {/* Trục X & Y */}
                                    <line x1={-3} y1={0} x2={chartW + 20} y2={0} stroke="#000" strokeWidth="4" markerEnd="url(#arrow)" />
                                    <line x1={0} y1={3} x2={0} y2={-chartH - 20} stroke="#000" strokeWidth="4" markerEnd="url(#arrow)" />

                                    {/* Mốc toạ độ (Ticks) 0, 4, 8... tới 32 (length: 9, step: 4) */}
                                    {Array.from({length: 9}, (_, i) => i * 4).map(val => (
                                        <g key={`tick-${val}`}>
                                            {/* Trục X */}
                                            {val > 0 && (
                                                <>
                                                    <line x1={val * scaleX} y1={0} x2={val * scaleX} y2={5} stroke="#000" strokeWidth="2" />
                                                    <text x={val * scaleX} y={20} fill="#000" fontSize="13" fontWeight="bold" fontFamily="sans-serif" textAnchor="middle">{val}</text>
                                                </>
                                            )}
                                            {/* Trục Y */}
                                            {val > 0 && (
                                                <>
                                                    <line x1={0} y1={-val * scaleY} x2={-5} y2={-val * scaleY} stroke="#000" strokeWidth="2" />
                                                    <text x={-10} y={-val * scaleY + 5} fill="#000" fontSize="13" fontWeight="bold" fontFamily="sans-serif" textAnchor="end">{val}</text>
                                                </>
                                            )}
                                        </g>
                                    ))}
                                    {/* Điểm gốc 0 */}
                                    <text x={-10} y={18} fill="#000" fontSize="13" fontWeight="bold" fontFamily="sans-serif" textAnchor="end">0</text>

                                    {/* Đường Ngân Sách */}
                                    <line 
                                        x1={0} y1={-yIntercept * scaleY} 
                                        x2={xIntercept * scaleX} y2={0} 
                                        stroke="#000" strokeWidth="5" strokeLinecap="round" 
                                    />
                                    <line 
                                        x1={0} y1={-yIntercept * scaleY} 
                                        x2={xIntercept * scaleX} y2={0} 
                                        stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" 
                                    />

                                    {/* THÊM VÙNG NHẬN DIỆN CHUỘT (HIT-BOX) ĐỂ ĐỔI CON TRỎ THÀNH BÀN TAY */}
                                    <line 
                                        x1={0} y1={-yIntercept * scaleY} 
                                        x2={xIntercept * scaleX} y2={0} 
                                        stroke="transparent" strokeWidth="20" strokeLinecap="round" 
                                        className="cursor-pointer"
                                    />

                                    <circle cx={0} cy={-yIntercept * scaleY} r="5" fill="#93A3C7" stroke="#000" strokeWidth="2" />
                                    <circle cx={xIntercept * scaleX} cy={0} r="5" fill="#93A3C7" stroke="#000" strokeWidth="2" />

                                    {/* Điểm toạ độ người dùng đã ghim (Click) */}
                                    {points.map(p => (
                                        <g key={p.id} onClick={(e) => handleRemovePoint(e, p.id)} className="cursor-pointer">
                                            <line x1={p.x * scaleX} y1={0} x2={p.x * scaleX} y2={-p.y * scaleY} stroke="#020C20" strokeWidth="0.8" strokeDasharray="4 4" opacity="0.3" />
                                            <line x1={0} y1={-p.y * scaleY} x2={p.x * scaleX} y2={-p.y * scaleY} stroke="#020C20" strokeWidth="0.8" strokeDasharray="4 4" opacity="0.3" />
                                            <circle 
                                                cx={p.x * scaleX} 
                                                cy={-p.y * scaleY} 
                                                r={6} 
                                                fill="#020C20" 
                                                stroke="#FFFFFF" 
                                                strokeWidth="2" 
                                                className="transition-all hover:stroke-[3.5px]"
                                            />
                                            <rect 
                                                x={p.x * scaleX + 10} y={-p.y * scaleY - 24} 
                                                width={90} height={24} rx={4} fill="#060a16" opacity="0.9" style={{ pointerEvents: 'none' }}
                                            />
                                            <text 
                                                x={p.x * scaleX + 55} y={-p.y * scaleY - 8} 
                                                fill="#fff" fontSize="12" fontFamily="monospace" textAnchor="middle" style={{ pointerEvents: 'none' }}
                                            >
                                                ({p.x.toFixed(1)}, {p.y.toFixed(1)})
                                            </text>
                                        </g>
                                    ))}

                                    {/* Điểm hover theo vị trí chuột (Trực tiếp) */}
                                    {hoverPoint && (
                                        <g style={{ pointerEvents: 'none' }}>
                                            {/* Đường gióng ngang dọc */}
                                            <line x1={hoverPoint.x * scaleX} y1={0} x2={hoverPoint.x * scaleX} y2={-hoverPoint.y * scaleY} stroke="#ffffff" strokeWidth="1" strokeDasharray="3 3" opacity="0.8" />
                                            <line x1={0} y1={-hoverPoint.y * scaleY} x2={hoverPoint.x * scaleX} y2={-hoverPoint.y * scaleY} stroke="#ffffff" strokeWidth="1" strokeDasharray="3 3" opacity="0.8" />
                                            
                                            {/* Điểm chấm ảo */}
                                            <circle cx={hoverPoint.x * scaleX} cy={-hoverPoint.y * scaleY} r="5" fill="#ffffff" opacity="0.9" />
                                            
                                            {/* Chữ hiển thị */}
                                            <rect x={hoverPoint.x * scaleX + 10} y={-hoverPoint.y * scaleY - 24} width="90" height="24" rx="4" fill="#ffffff" opacity="0.95" />
                                            <text x={hoverPoint.x * scaleX + 55} y={-hoverPoint.y * scaleY - 8} fill="#060a16" fontSize="12" fontWeight="bold" fontFamily="monospace" textAnchor="middle">
                                                ({hoverPoint.x.toFixed(1)}, {hoverPoint.y.toFixed(1)})
                                            </text>
                                        </g>
                                    )}
                                </g>
                            </svg>
                        </div>
                    </div>

                    {/* Khu vực 3: Góc dưới (Tỷ lệ và các khái niệm) */}
                    <div className="flex flex-col md:flex-row items-center justify-center w-full max-w-[800px] gap-8 flex-shrink-0 z-10">
                        <div className="flex items-center gap-4 text-xl font-medium">
                            <div className="flex flex-col items-center text-lg">
                                <span className="border-b border-white px-2 leading-tight pb-0.5">Px</span>
                                <span className="leading-tight pt-0.5">Py</span>
                            </div>
                            <span>=</span>
                            <span className="border-[1.5px] border-white rounded-xl px-4 py-1.5 bg-[#060a16] font-mono text-lg min-w-[4.5rem] text-center tracking-wider">
                                {ratioVal}
                            </span>
                        </div>

                        <svg width="40" height="20" viewBox="0 0 60 24" className="hidden md:block">
                            <line x1="0" y1="12" x2="48" y2="12" stroke="white" strokeWidth="2" />
                            <polygon points="48,5 60,12 48,19" fill="white" />
                        </svg>

                        <div className="flex flex-col gap-2 text-base tracking-wide text-white/90 border-l-2 md:border-l-0 border-white/20 pl-4 md:pl-0">
                            <div>Tỷ giá tương đối : <span className="font-mono text-white ml-1">{ratioVal}</span></div>
                            <div>Chi phí cơ hội : <span className="font-mono text-white ml-1">{ratioVal}</span></div>
                            <div>Tỷ lệ thay thế khách quan : <span className="font-mono text-white ml-1">{ratioVal}</span></div>
                        </div>
                    </div>

                    <div className="text-xs text-gray-500 font-sans tracking-wide">
                        * Di chuột lên đồ thị để dò toạ độ trực tiếp. Click để ghim. Click lại vào điểm đã ghim để xoá.
                    </div>
                </div>
            );
        }

        // Render ứng dụng React vào thẻ div#root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
