<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ Đường ngân sách</title>
    
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import thư viện React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Import Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#060a16] m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // =====================================================================
        // COMPONENT CON MẮT SVG (ĐỒ HOẠ MỚI - HOẠT ẢNH MƯỢT MÀ)
        // =====================================================================
        const EyeIcon = ({ isOpen, toggle }) => {
            const [eyeState, setEyeState] = useState('nham');

            useEffect(() => {
                if (!isOpen) {
                    setEyeState('nham');
                    return;
                }

                let isRunning = true;
                const runSequence = async () => {
                    const wait = (ms) => new Promise(res => setTimeout(res, ms));

                    while(isRunning) {
                        // Nhịp 2: Mở mắt nhìn thẳng
                        setEyeState('mo1'); 
                        await wait(1500);
                        if(!isRunning) break;

                        // Nhịp 3: Liếc trái (Trừng nhẹ)
                        setEyeState('mo2'); 
                        await wait(2000);
                        if(!isRunning) break;

                        // Nhịp 4: Liếc phải (Nheo lườm)
                        setEyeState('mo3'); 
                        await wait(2000);
                    }
                };
                runSequence();
                return () => { isRunning = false; };
            }, [isOpen]);

            return (
                <div 
                    onClick={toggle}
                    className="cursor-pointer shadow-lg transition-transform hover:scale-110 flex items-center justify-center bg-[#020C20]"
                    // KÍCH THƯỚC Ô CHỨA LÀ 64px VÀ DÙNG BORDER LÀM VIỀN NGOÀI DÀY 4PX
                    style={{ width: '64px', height: '64px', borderRadius: '50%', border: '4px solid #88A4CF', overflow: 'hidden' }}
                    title={isOpen ? 'Tắt vùng khả thi' : 'Hiện vùng khả thi'}
                >
                    {/* SVG CON MẮT (KÍCH THƯỚC MẮT GIỮ NGUYÊN TUYỆT ĐỐI 51px) */}
                    <svg viewBox="0 0 100 100" shapeRendering="geometricPrecision" className={`eye-svg state-${eyeState}`} style={{ width: '51px', height: '51px' }}>
                        <defs>
                            {/* Mask (Mặt nạ) để cắt góc con ngươi 1 cách cực kỳ sắc nét */}
                            <mask id="pupilCutout">
                                <rect x="0" y="0" width="100" height="100" fill="white" />
                                <polygon points="50,50 65,50 65,35" fill="black" />
                            </mask>
                        </defs>
                        
                        {/* VÒNG TRÒN NỀN BÊN TRONG (Đã tăng r từ 38 lên 48 để hình tròn phình to sát viền ngoài) */}
                        <circle cx="50" cy="50" r="48" fill="#88A4CF" />
                        
                        {/* Cụm tia sáng (Rays) */}
                        <g className="rays" stroke="#020C20" strokeWidth="6" strokeLinecap="round">
                            {/* 3 tia trên */}
                            <line x1="50" y1="16" x2="50" y2="25" />
                            <line x1="34" y1="20" x2="41" y2="28" />
                            <line x1="66" y1="20" x2="59" y2="28" />
                            {/* 3 tia dưới */}
                            <line x1="50" y1="84" x2="50" y2="75" />
                            <line x1="34" y1="80" x2="41" y2="72" />
                            <line x1="66" y1="80" x2="59" y2="72" />
                        </g>

                        {/* Cụm Mắt (Khung + Con ngươi) */}
                        <g className="eye-group">
                            {/* Khung mắt hình quả hạnh nhân */}
                            <path className="eye-frame" d="M 20 50 Q 50 20 80 50 Q 50 80 20 50 Z" fill="#88A4CF" stroke="#020C20" strokeWidth="6" strokeLinejoin="round" strokeLinecap="round" />
                            
                            {/* Con ngươi */}
                            <g className="pupil-group">
                                <circle cx="50" cy="50" r="12" fill="#020C20" mask="url(#pupilCutout)" />
                            </g>
                        </g>
                    </svg>
                </div>
            );
        };

        // =====================================================================
        // COMPONENT MENU HƯỚNG DẪN 
        // =====================================================================
        const GuideIcon = ({ toggle }) => {
            return (
                <div 
                    onClick={toggle}
                    className="cursor-pointer shadow-lg transition-transform hover:scale-110 flex flex-col items-center justify-center gap-[6px] bg-[#88A4CF]"
                    // Đồng bộ viền nút này lên 4px để 2 nút cân xứng hoàn toàn
                    style={{ width: '64px', height: '64px', borderRadius: '50%', border: '4px solid rgba(255,255,255,0.25)' }}
                    title="Hướng dẫn sử dụng"
                >
                    <div style={{ width: '32px', height: '5px', backgroundColor: '#020C20', borderRadius: '3px' }}></div>
                    <div style={{ width: '32px', height: '5px', backgroundColor: '#020C20', borderRadius: '3px' }}></div>
                    <div style={{ width: '32px', height: '5px', backgroundColor: '#020C20', borderRadius: '3px' }}></div>
                </div>
            );
        };

        function App() {
            const [showIntro, setShowIntro] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [showGuide, setShowGuide] = useState(false);
            const [income, setIncome] = useState(16);
            const [priceX, setPriceX] = useState(2.0); 
            const [priceY, setPriceY] = useState(1.0);
            const [points, setPoints] = useState([]);
            const [hoverPoint, setHoverPoint] = useState(null);
            const [showFeasible, setShowFeasible] = useState(false);
            const [baseline, setBaseline] = useState(null);
            const svgRef = useRef(null);
            const maxVal = 32;
            const width = 640;
            const height = 360;
            const padL = 60, padB = 40, padR = 40, padT = 40; 
            const chartW = width - padL - padR;
            const chartH = height - padB - padT;
            const scaleX = chartW / maxVal;
            const scaleY = chartH / maxVal;
            const xIntercept = income / priceX;
            const yIntercept = income / priceY;
            const ratioVal = (priceX / priceY).toFixed(2);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setIsFullscreen(false);
                        setShowGuide(false);
                    }
                };
                document.addEventListener('keydown', handleKeyDown);
                return () => document.removeEventListener('keydown', handleKeyDown);
            }, []);

            const toggleFullscreen = () => setIsFullscreen(!isFullscreen);

            const getLogicalCoordinates = (clientX, clientY) => {
                const svg = svgRef.current;
                if (!svg) return null;
                const pt = svg.createSVGPoint();
                pt.x = clientX;
                pt.y = clientY;
                const cursorPt = pt.matrixTransform(svg.getScreenCTM().inverse());
                
                const graphX = cursorPt.x - padL;
                const graphY = (height - padB) - cursorPt.y; 

                if (graphX >= -10 && graphX <= chartW + 20 && graphY >= -10 && graphY <= chartH + 20) {
                    return { x: Math.max(0, graphX) / scaleX, y: Math.max(0, graphY) / scaleY };
                }
                return null;
            };

            const handleMouseMove = (e) => setHoverPoint(getLogicalCoordinates(e.clientX, e.clientY));
            const handleMouseLeave = () => setHoverPoint(null);
            const handleChartClick = (e) => {
                const coords = getLogicalCoordinates(e.clientX, e.clientY);
                if (coords) setPoints([...points, { id: Date.now(), x: coords.x, y: coords.y }]);
            };
            const handleRemovePoint = (e, id) => {
                e.stopPropagation(); 
                setPoints(points.filter(p => p.id !== id));
            };

            if (showIntro) {
                return (
                    <div onClick={() => setShowIntro(false)} className="h-screen w-screen bg-[#020C20] flex items-center justify-center text-white overflow-hidden relative cursor-pointer" style={{ fontFamily: "'Roboto Slab', serif" }}>
                        <style dangerouslySetInnerHTML={{__html: `@import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500&display=swap');`}} />
                        <div className="text-center text-[48px] leading-[64px] text-white uppercase px-4">BIỂU ĐỒ TƯƠNG TÁC MINH HOẠ<br/>ĐƯỜNG NGÂN SÁCH</div>
                        <div className="absolute bottom-8 right-8 lg:bottom-[39px] lg:right-[189px] text-[15px] leading-[132.42%] text-white opacity-[0.51]">by Tuấn Anh - 2511110048</div>
                        <div className="absolute bottom-8 text-[13px] opacity-20 animate-pulse tracking-wider">* Nhấp chuột để bắt đầu</div>
                    </div>
                );
            }

            return (
                <div className={`${isFullscreen ? 'fixed inset-0 z-[100] w-full h-full' : 'h-screen w-full relative'} bg-[#060a16] flex flex-col items-center justify-evenly py-4 px-4 font-serif text-white selection:bg-[#93A3C7] overflow-hidden`}>

                    <button onClick={toggleFullscreen} className="absolute top-4 right-4 p-2.5 bg-white/10 hover:bg-white/20 rounded-full transition-colors z-50 flex items-center justify-center border border-white/20 text-[#93A3C7]">
                        {isFullscreen ? (<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>) : (<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>)}
                    </button>

                    <div className="absolute top-4 left-4 z-50 flex gap-3">
                        <EyeIcon isOpen={showFeasible} toggle={() => setShowFeasible(!showFeasible)} />
                        <GuideIcon toggle={() => setShowGuide(true)} />
                    </div>

                    {showGuide && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-[#020C20]/80 backdrop-blur-sm transition-opacity" onClick={() => setShowGuide(false)}>
                            <div className="bg-[#060a16] border-[1.5px] border-[#88A4CF]/40 rounded-2xl p-6 md:p-8 max-w-2xl w-[90%] shadow-2xl relative cursor-default" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowGuide(false)} className="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </button>
                                <h2 className="text-[26px] font-['Roboto_Slab'] text-[#81AAE9] mb-6 text-center">Hướng Dẫn Sử Dụng</h2>
                                <ul className="space-y-5 text-gray-300 font-sans text-[15px] leading-relaxed">
                                    <li className="flex gap-4 items-start"><div><b>Nút Con Mắt:</b> Bật/tắt "Vùng Khả Thi" (tập hợp các gói hàng hóa bạn có thể mua với ngân sách hiện tại).</div></li>
                                    <li className="flex gap-4 items-start"><div><b>Thanh Trượt:</b> Kéo để thay đổi các biến số: Thu nhập (I), Giá hàng X (Px) và Giá hàng Y (Py).</div></li>
                                    <li className="flex gap-4 items-start"><div><b>Nút Ghim Mốc:</b> Lưu lại hình dáng đường ngân sách hiện tại (làm bóng mờ) để dễ dàng so sánh sự tịnh tiến/xoay khi bạn thay đổi các thông số.</div></li>
                                    <li className="flex gap-4 items-start">
                                        <div>
                                            <b>Tương Tác Đồ Thị:</b> Click vào bất kỳ đâu trên đồ thị để ghim điểm tọa độ. Phân tích màu sắc điểm ghim:<br/>
                                            <span className="text-[#10b981] font-bold tracking-wide mt-1 inline-block">● Xanh lá:</span> Gói hàng tối ưu (Sử dụng hết ngân sách).<br/>
                                            <span className="text-[#f59e0b] font-bold tracking-wide mt-1 inline-block">● Màu Vàng:</span> Gói hàng khả thi nhưng dư tiền.<br/>
                                            <span className="text-[#ef4444] font-bold tracking-wide mt-1 inline-block">● Màu Đỏ:</span> Gói hàng không khả thi (Vượt quá ngân sách).
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    )}

                    <style dangerouslySetInnerHTML={{__html: `
                        /* THANH TRƯỢT */
                        .custom-slider { -webkit-appearance: none; background: transparent; width: 100%; }
                        .custom-slider:focus { outline: none; }
                        .custom-slider::-webkit-slider-runnable-track { width: 100%; height: 1px; cursor: pointer; background: #475569; }
                        .custom-slider::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: #060a16; border: 4px solid #ffffff; cursor: pointer; -webkit-appearance: none; margin-top: -7.5px; }

                        /* ============ CSS ANIMATION CON MẮT MỚI (SVG) ============ */
                        .eye-svg { width: 100%; height: 100%; }
                        /* Mọi thành phần trong SVG đều chuyển động mượt */
                        .eye-svg * {
                            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
                            transform-origin: 50px 50px; /* Tâm quay ở giữa toạ độ 100x100 */
                        }

                        /* NHỊP 1: TRẠNG THÁI NHẮM */
                        .state-nham .rays { opacity: 0; transform: scale(0.8); }
                        .state-nham .eye-frame { transform: scaleY(0.1); fill: #020C20; stroke-width: 16px; } /* Ép bẹp và làm dày nét mắt lại */
                        .state-nham .pupil-group { opacity: 0; transform: scale(0); }

                        /* NHỊP 2: MỞ MẮT NHÌN THẲNG */
                        .state-mo1 .rays { opacity: 1; transform: rotate(0deg); }
                        .state-mo1 .eye-frame { transform: scaleY(1); }
                        .state-mo1 .pupil-group { opacity: 1; transform: translate(0, 0) scale(1); }

                        /* NHỊP 3: LIẾC TRÁI (Trừng nhẹ) */
                        .state-mo2 .rays { transform: translate(-4px, 0) rotate(-15deg); }
                        .state-mo2 .eye-frame { transform: scaleY(1.05); } 
                        .state-mo2 .pupil-group { transform: translate(-10px, 0) scale(1.05); }

                        /* NHỊP 4: LIẾC PHẢI (Nheo lườm) */
                        .state-mo3 .rays { transform: translate(4px, 0) rotate(15deg); }
                        .state-mo3 .eye-frame { transform: scaleY(0.85); } /* Nheo mắt */
                        .state-mo3 .pupil-group { transform: translate(10px, 0) scale(0.95); }
                    `}} />

                    <div className="border border-white/60 rounded-[1.25rem] px-8 py-3 text-xl flex items-center justify-center gap-4 shadow-lg bg-[#060a16] flex-shrink-0 z-10 mt-2">
                        <span>Y = -</span>
                        <div className="flex flex-col items-center text-lg font-mono text-[#93A3C7] font-bold">
                            <span className="border-b border-[#93A3C7] px-2 leading-tight pb-0.5">{priceX.toFixed(1)}</span>
                            <span className="leading-tight pt-0.5">{priceY.toFixed(1)}</span>
                        </div>
                        <span>. X +</span>
                        <div className="flex flex-col items-center text-lg font-mono text-[#93A3C7] font-bold">
                            <span className="border-b border-[#93A3C7] px-2 leading-tight pb-0.5">{income}</span>
                            <span className="leading-tight pt-0.5">{priceY.toFixed(1)}</span>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row justify-center items-center w-full max-w-5xl gap-8 lg:gap-16 flex-shrink-0 mt-4">
                        <div className="flex flex-col gap-6 w-full max-w-[240px]">
                            <div className="flex flex-col gap-3 w-full">
                                <div className="flex justify-end items-center gap-3 w-full pr-2">
                                    <span className="text-xl font-medium text-right">I =</span>
                                    <span className="border-[1.5px] border-white rounded-xl px-3 py-1 bg-[#060a16] min-w-[4rem] text-center font-mono text-lg tracking-widest">{income.toString().padStart(2, '0')}</span>
                                </div>
                                <input type="range" className="custom-slider" min="16" max="32" step="1" value={income} onChange={(e)=>setIncome(Number(e.target.value))} />
                            </div>
                            <div className="flex flex-col gap-3 w-full">
                                <div className="flex justify-end items-center gap-3 w-full pr-2">
                                    <span className="text-xl font-medium text-right">Px =</span>
                                    <span className="border-[1.5px] border-white rounded-xl px-3 py-1 bg-[#060a16] min-w-[4rem] text-center font-mono text-lg tracking-widest">{(priceX < 10 ? '0' : '') + priceX.toFixed(1)}</span>
                                </div>
                                <input type="range" className="custom-slider" min="1" max="20" step="0.1" value={priceX} onChange={(e)=>setPriceX(Number(e.target.value))} />
                            </div>
                            <div className="flex flex-col gap-3 w-full">
                                <div className="flex justify-end items-center gap-3 w-full pr-2">
                                    <span className="text-xl font-medium text-right">Py =</span>
                                    <span className="border-[1.5px] border-white rounded-xl px-3 py-1 bg-[#060a16] min-w-[4rem] text-center font-mono text-lg tracking-widest">{(priceY < 10 ? '0' : '') + priceY.toFixed(1)}</span>
                                </div>
                                <input type="range" className="custom-slider" min="1" max="20" step="0.1" value={priceY} onChange={(e)=>setPriceY(Number(e.target.value))} />
                            </div>
                            <button onClick={() => setBaseline(baseline ? null : { income, priceX, priceY })} className={`mt-2 py-2 px-4 rounded-xl border transition-all font-sans text-sm font-medium ${baseline ? 'bg-red-500/20 border-red-500/50 text-red-300 hover:bg-red-500/30' : 'bg-white/5 border-white/20 hover:bg-white/10 text-gray-300'}`}>
                                {baseline ? '🗑 Bỏ ghim mốc so sánh' : '📌 Ghim mốc này để so sánh'}
                            </button>
                        </div>

                        <div className="w-full max-w-[640px] bg-[#88A4CF] rounded-[2rem] py-6 px-6 shadow-2xl relative select-none flex justify-center items-center overflow-hidden">
                            <svg ref={svgRef} viewBox={`0 0 ${width} ${height}`} className="w-full h-auto drop-shadow-md overflow-hidden cursor-crosshair" onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} onClick={handleChartClick}>
                                <defs>
                                    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#000" /></marker>
                                </defs>
                                <g transform={`translate(${padL}, ${height - padB})`}>
                                    <rect x={0} y={-chartH - 20} width={chartW + 20} height={chartH + 20} fill="transparent" />
                                    {Array.from({length: maxVal}, (_, i) => i + 1).map(val => (
                                        <g key={`grid-${val}`}>
                                            <line x1={val * scaleX} y1={0} x2={val * scaleX} y2={-chartH - 20} stroke="#020C20" strokeWidth="0.8" opacity="0.15" />
                                            <line x1={0} y1={-val * scaleY} x2={chartW + 20} y2={-val * scaleY} stroke="#020C20" strokeWidth="0.8" opacity="0.15" />
                                        </g>
                                    ))}
                                    <polygon points={`0,0 0,${-yIntercept * scaleY} ${xIntercept * scaleX},0`} fill="#4B8EF2" opacity={showFeasible ? "1" : "0"} style={{ transition: 'opacity 0.4s ease-in-out' }} />
                                    <line x1={-3} y1={0} x2={chartW + 20} y2={0} stroke="#000" strokeWidth="4" markerEnd="url(#arrow)" />
                                    <line x1={0} y1={3} x2={0} y2={-chartH - 20} stroke="#000" strokeWidth="4" markerEnd="url(#arrow)" />
                                    {Array.from({length: 9}, (_, i) => i * 4).map(val => (
                                        <g key={`tick-${val}`}>
                                            {val > 0 && (<><line x1={val * scaleX} y1={0} x2={val * scaleX} y2={5} stroke="#000" strokeWidth="2" /><text x={val * scaleX} y={20} fill="#000" fontSize="13" fontWeight="bold" fontFamily="sans-serif" textAnchor="middle">{val}</text></>)}
                                            {val > 0 && (<><line x1={0} y1={-val * scaleY} x2={-5} y2={-val * scaleY} stroke="#000" strokeWidth="2" /><text x={-10} y={-val * scaleY + 5} fill="#000" fontSize="13" fontWeight="bold" fontFamily="sans-serif" textAnchor="end">{val}</text></>)}
                                        </g>
                                    ))}
                                    <text x={-10} y={18} fill="#000" fontSize="13" fontWeight="bold" fontFamily="sans-serif" textAnchor="end">0</text>
                                    {baseline && (
                                        <g>
                                            <line x1={0} y1={-(baseline.income / baseline.priceY) * scaleY} x2={(baseline.income / baseline.priceX) * scaleX} y2={0} stroke="#334155" strokeWidth="3" strokeDasharray="8 6" opacity="0.6" strokeLinecap="round" />
                                            <text x={(baseline.income / baseline.priceX) * scaleX - 10} y={-10} fill="#334155" fontSize="11" fontWeight="bold" fontFamily="sans-serif" textAnchor="end" opacity="0.8">(Mốc cũ)</text>
                                        </g>
                                    )}
                                    <text x={xIntercept * scaleX} y={-10} fill="#020C20" fontSize="11" fontWeight="bold" fontFamily="sans-serif" textAnchor="middle" opacity="0.6">I/Px</text>
                                    <text x={15} y={-yIntercept * scaleY} fill="#020C20" fontSize="11" fontWeight="bold" fontFamily="sans-serif" opacity="0.6">I/Py</text>
                                    <line x1={0} y1={-yIntercept * scaleY} x2={xIntercept * scaleX} y2={0} stroke="#000" strokeWidth="5" strokeLinecap="round" />
                                    <line x1={0} y1={-yIntercept * scaleY} x2={xIntercept * scaleX} y2={0} stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" />
                                    <circle cx={0} cy={-yIntercept * scaleY} r="5" fill="#93A3C7" stroke="#000" strokeWidth="2" />
                                    <circle cx={xIntercept * scaleX} cy={0} r="5" fill="#93A3C7" stroke="#000" strokeWidth="2" />
                                    {points.map(p => {
                                        const cost = p.x * priceX + p.y * priceY;
                                        const diff = cost - income;
                                        let statusColor = "#fff", statusMsg = "";
                                        if (Math.abs(diff) < 0.15) { statusColor = "#10b981"; statusMsg = "Hết I"; } 
                                        else if (diff < 0) { statusColor = "#f59e0b"; statusMsg = `Dư ${Math.abs(diff).toFixed(1)}`; } 
                                        else { statusColor = "#ef4444"; statusMsg = `Thiếu ${Math.abs(diff).toFixed(1)}`; }
                                        return (
                                            <g key={p.id} onClick={(e) => handleRemovePoint(e, p.id)} className="cursor-pointer group">
                                                <line x1={p.x * scaleX} y1={0} x2={p.x * scaleX} y2={-p.y * scaleY} stroke="#020C20" strokeWidth="0.8" strokeDasharray="4 4" opacity="0.3" />
                                                <line x1={0} y1={-p.y * scaleY} x2={p.x * scaleX} y2={-p.y * scaleY} stroke="#020C20" strokeWidth="0.8" strokeDasharray="4 4" opacity="0.3" />
                                                <circle cx={p.x * scaleX} cy={-p.y * scaleY} r={6} fill="#020C20" stroke={statusColor} strokeWidth="2.5" className="transition-all group-hover:stroke-[4px]" />
                                                <rect x={p.x * scaleX + 10} y={-p.y * scaleY - 38} width={100} height={36} rx={6} fill="#060a16" opacity="0.95" style={{ pointerEvents: 'none' }} />
                                                <text x={p.x * scaleX + 60} y={-p.y * scaleY - 22} fill="#fff" fontSize="12" fontFamily="monospace" textAnchor="middle" style={{ pointerEvents: 'none' }}>({p.x.toFixed(1)}, {p.y.toFixed(1)})</text>
                                                <text x={p.x * scaleX + 60} y={-p.y * scaleY - 8} fill={statusColor} fontSize="11" fontWeight="bold" fontFamily="sans-serif" textAnchor="middle" style={{ pointerEvents: 'none' }}>{statusMsg}</text>
                                            </g>
                                        );
                                    })}
                                    {hoverPoint && (
                                        <g style={{ pointerEvents: 'none' }}>
                                            <line x1={hoverPoint.x * scaleX} y1={0} x2={hoverPoint.x * scaleX} y2={-hoverPoint.y * scaleY} stroke="#ffffff" strokeWidth="1" strokeDasharray="3 3" opacity="0.8" />
                                            <line x1={0} y1={-hoverPoint.y * scaleY} x2={hoverPoint.x * scaleX} y2={-hoverPoint.y * scaleY} stroke="#ffffff" strokeWidth="1" strokeDasharray="3 3" opacity="0.8" />
                                            <circle cx={hoverPoint.x * scaleX} cy={-hoverPoint.y * scaleY} r="5" fill="#ffffff" opacity="0.9" />
                                            <rect x={hoverPoint.x * scaleX + 10} y={-hoverPoint.y * scaleY - 24} width="90" height="24" rx="4" fill="#ffffff" opacity="0.95" />
                                            <text x={hoverPoint.x * scaleX + 55} y={-hoverPoint.y * scaleY - 8} fill="#060a16" fontSize="12" fontWeight="bold" fontFamily="monospace" textAnchor="middle">({hoverPoint.x.toFixed(1)}, {hoverPoint.y.toFixed(1)})</text>
                                        </g>
                                    )}
                                </g>
                            </svg>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row items-center justify-center w-full max-w-[800px] gap-8 flex-shrink-0 z-10 mt-2">
                        <div className="flex items-center gap-4 text-xl font-medium">
                            <div className="flex flex-col items-center text-lg">
                                <span className="border-b border-white px-2 leading-tight pb-0.5">Px</span>
                                <span className="leading-tight pt-0.5">Py</span>
                            </div>
                            <span>=</span>
                            <span className="border-[1.5px] border-white rounded-xl px-4 py-1.5 bg-[#060a16] font-mono text-lg min-w-[4.5rem] text-center tracking-wider">{ratioVal}</span>
                        </div>
                        <svg width="40" height="20" viewBox="0 0 60 24" className="hidden md:block">
                            <line x1="0" y1="12" x2="48" y2="12" stroke="white" strokeWidth="2" />
                            <polygon points="48,5 60,12 48,19" fill="white" />
                        </svg>
                        <div className="flex flex-col gap-2 text-base tracking-wide text-white/90 border-l-2 md:border-l-0 border-white/20 pl-4 md:pl-0">
                            <div>Tỷ giá tương đối : <span className="font-mono text-white ml-1">{ratioVal}</span></div>
                            <div>Chi phí cơ hội : <span className="font-mono text-white ml-1">{ratioVal}</span></div>
                            <div>Tỷ lệ thay thế khách quan : <span className="font-mono text-white ml-1">{ratioVal}</span></div>
                        </div>
                    </div>

                    <div className="flex items-center justify-center w-[95%] max-w-[600px] border-[1.5px] border-[#D9D9D9] rounded-[16px] px-4 py-3 mt-4 mb-2">
                        <p className="font-['Roboto_Slab'] text-[16px] md:text-[20px] text-white text-center leading-[140%] tracking-normal">
                            Với thu nhập là <span className="text-[#81AAE9] font-medium">{income}</span>, bạn có thể mua tối đa <span className="text-[#81AAE9] font-medium">{Number(xIntercept.toFixed(1))}</span> hộp X hoặc <span className="text-[#81AAE9] font-medium">{Number(yIntercept.toFixed(1))}</span> bánh Y.
                        </p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
